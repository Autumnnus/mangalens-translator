services:
  postgres:
    image: postgres:15-alpine
    container_name: mangalens-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mangalens}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mangalens-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: mangalens-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - mangalens-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Optional: Create default bucket automatically
  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env.local
    entrypoint: >
      /bin/sh -c "
      sleep 2;
      /usr/bin/mc config host add myminio http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb myminio/$${MINIO_BUCKET_NAME:-mangalens} || true;
      /usr/bin/mc anonymous set download myminio/$${MINIO_BUCKET_NAME:-mangalens};
      exit 0;
      "
    networks:
      - mangalens-network

  # Also add env_file to other services for consistency if needed,
  # but they are already using ${VAR} syntax which works if run from the same dir.
  # Added for createbuckets as it's the most sensitive to these vars.

volumes:
  postgres_data:
  minio_data:

networks:
  mangalens-network:
    driver: bridge
